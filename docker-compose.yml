# Docker Compose：本地开发与运行编排
# 使用方法：
#   docker compose run --rm axon-dev bash     # 进入开发容器
#   docker compose run --rm axon-test         # 运行测试
#   docker compose up axon                    # 运行 axon 服务
#   docker compose build                      # 重新构建镜像

services:
  # ===== 生产运行时 =====
  axon:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: axon:local
    container_name: axon
    restart: unless-stopped
    # 挂载配置与数据
    volumes:
      - ./data:/home/axon/data:ro
      - ./config:/home/axon/config:ro
    environment:
      - RUST_LOG=info
      - AXON_LOG_LEVEL=info
    # 按需暴露端口（生产环境建议在 reverse proxy 之后）
    # ports:
    #   - "9090:9090"  # metrics
    networks:
      - axon-net

  # ===== CI 测试运行器 =====
  axon-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    image: axon:builder
    container_name: axon-test
    profiles: ["test"]
    command: ["cargo", "test", "--workspace", "--all-features"]
    working_dir: /build
    volumes:
      - .:/build
      - cargo-cache:/usr/local/cargo/registry
    networks:
      - axon-net

  # ===== 开发容器 =====
  axon-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    image: axon:builder
    container_name: axon-dev
    profiles: ["dev"]
    # 保持 stdin 打开以便交互
    stdin_open: true
    tty: true
    command: ["bash"]
    working_dir: /build
    volumes:
      - .:/build
      - cargo-cache:/usr/local/cargo/registry
    networks:
      - axon-net

networks:
  axon-net:
    driver: bridge

volumes:
  cargo-cache:
    driver: local
